<mat-card class="card-container">
  <h1 class="page-title">Yearly objectives</h1>
  <mat-card-content class="form-container">
    <div>
      <mat-form-field class="form-field">
        <mat-label>Username</mat-label>
        <input matInput type="text" [field]="loginForm.username" />
        @if (loginForm.username().touched() && loginForm.username().invalid()) {
          <mat-error>
            {{ loginForm.username().errors()[0].message }}
          </mat-error>
        }
      </mat-form-field>

      <mat-form-field class="form-field">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          [field]="loginForm.password"
        />
        <button
          matIconButton
          matSuffix
          (click)="showPassword($event)"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hidePassword()"
        >
          <mat-icon>{{
            hidePassword() ? "visibility_off" : "visibility"
          }}</mat-icon>
        </button>
        @if (loginForm.password().touched() && loginForm.password().invalid()) {
          <mat-error>
            {{ loginForm.password().errors()[0].message }}
          </mat-error>
        }
      </mat-form-field>
    </div>
  </mat-card-content>

  <div class="sign-up-container">
    <button
      type="submit"
      class="sign-up-button"
      mat-flat-button
      (click)="submitForm()"
      [disabled]="loginForm().invalid()"
    >
      Login
    </button>

    <div class="sign-up-buttons-links">
      <button mat-button disabled>Reset password</button>
      <mat-divider [vertical]="true"></mat-divider>
      <a mat-button routerLink="/create-account">Create account</a>
    </div>
  </div>
</mat-card>
